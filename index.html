<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biitsi Vakiovuorot 2026–27</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏐</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090b;--card:#111113;--border:#1c1c1f;--yellow:#FFF200;--text:#d4d4d8;--muted:#555;--dim:#444;--font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh}
button{font-family:var(--font);cursor:pointer}
input,textarea{font-family:var(--font)}
::selection{background:var(--yellow);color:#000}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:24px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;max-width:380px;width:90%}
.login-logo{font-size:32px;font-weight:800;color:var(--yellow);margin-bottom:4px;letter-spacing:-1px}
.login-sub{color:var(--muted);font-size:12px;margin-bottom:28px}
.login-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 28px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.login-btn:hover{border-color:var(--yellow);background:#FFF20008}
.login-btn img{width:20px;height:20px}
.login-error{color:#ef4444;font-size:11px;margin-top:12px;display:none}
.login-note{color:#333;font-size:10px;margin-top:16px}

/* HEADER */
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{font-size:18px;font-weight:800;color:var(--yellow);letter-spacing:-.5px}
.subtitle{color:var(--muted);font-size:11px;font-weight:500;margin-left:10px}
.saved-badge{font-size:9px;color:#22c55e;background:#052e1688;padding:2px 8px;border-radius:99px;font-weight:600;letter-spacing:.5px;margin-left:10px;opacity:0;transition:opacity .3s}
.saved-badge.show{opacity:1}
.user-info{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
.user-info img{width:24px;height:24px;border-radius:99px;border:1px solid var(--border)}
.user-info button{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:#666;font-size:10px;cursor:pointer}

.tabs{display:flex;gap:2px;background:var(--card);border-radius:8px;padding:2px;border:1px solid var(--border)}
.tab{padding:6px 12px;border-radius:6px;border:none;font-size:11px;font-weight:600;background:transparent;color:#666;transition:all .15s}
.tab.active{background:var(--yellow);color:#000}

.stats-bar{border-bottom:1px solid var(--border);padding:10px 20px;background:#0c0c0e}
.stats-inner{max-width:1400px;margin:0 auto;display:flex;gap:20px;flex-wrap:wrap;font-size:11px}
.stats-inner b{font-family:var(--mono)}

.content{max-width:1400px;margin:0 auto;padding:16px 20px}

.day-tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.day-tab{padding:8px 14px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:600;background:var(--card);color:#666;transition:all .15s;text-align:center;min-width:60px}
.day-tab.active{border-color:#FFF20044;background:#FFF20010;color:var(--yellow)}
.day-tab small{display:block;font-size:10px;font-weight:400;opacity:.5;font-family:var(--mono);margin-top:2px}

.legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;align-items:center;font-size:10px;color:#888}
.legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:5px}

.grid-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:24px}
table{width:100%;border-collapse:collapse;min-width:420px}
th{padding:7px 8px;text-align:center;font-size:10px;color:var(--dim);font-weight:600;border-bottom:1px solid var(--border);background:var(--card)}
th:first-child{text-align:left;padding-left:10px;width:80px}
td{padding:2px 3px;border-bottom:1px solid var(--border);text-align:center}
td:first-child{padding:4px 10px;text-align:left;font-family:var(--mono);font-size:11px;white-space:nowrap}

.slot-btn{width:100%;padding:5px 4px;border-radius:5px;border:none;font-size:10px;font-weight:600;font-family:var(--font);transition:all .12s;display:flex;flex-direction:column;align-items:center;min-height:28px;position:relative;cursor:pointer}
.slot-btn:hover{filter:brightness(1.3)}
.wl-badge{position:absolute;top:-4px;right:-4px;background:#a855f7;color:#fff;font-size:8px;font-weight:700;width:14px;height:14px;border-radius:99px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bg)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:2px}
.slot-info{font-size:11px;color:var(--muted);margin-bottom:16px;font-family:var(--mono)}
.field-label{font-size:10px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:14px}
.status-btn{padding:7px 8px;border-radius:6px;font-size:11px;font-weight:600;transition:all .12s;cursor:pointer}
.field-input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;outline:none}
.field-textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none;resize:vertical}
.price-info{font-size:10px;color:var(--muted);padding:8px;background:var(--bg);border-radius:6px;font-family:var(--mono);border:1px solid var(--border);margin-bottom:14px}
.btn-save{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:700;background:var(--yellow);color:#000;cursor:pointer}
.btn-cancel{padding:10px 18px;border-radius:8px;border:1px solid var(--border);font-size:12px;background:transparent;color:#666;cursor:pointer}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.kpi-label{font-size:10px;color:var(--muted);margin-bottom:6px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.kpi-value{font-size:24px;font-weight:800;font-family:var(--mono);letter-spacing:-1px}
.kpi-sub{font-size:10px;color:var(--dim);margin-top:4px}

.section-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-top:20px}
.section-title{font-size:13px;font-weight:700;color:var(--yellow);margin:0 0 14px;letter-spacing:.5px;text-transform:uppercase}

.bar-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.bar-label{width:85px;font-weight:600;font-size:12px;flex-shrink:0}
.bar-track{flex:1;height:16px;background:#1a1a1a;border-radius:3px;overflow:hidden;display:flex}
.bar-pct{font-size:12px;font-weight:700;font-family:var(--mono);width:40px;text-align:right;flex-shrink:0}
.bar-euro{font-size:10px;color:var(--muted);width:75px;text-align:right;flex-shrink:0;font-family:var(--mono)}

.loc-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.loc-card{background:var(--bg);border-radius:8px;padding:14px;border:1px solid var(--border)}
.progress-bar{height:6px;background:#1a1a1a;border-radius:99px;overflow:hidden;display:flex;margin-bottom:10px}
.loc-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px}
.loc-revenue{grid-column:1/-1;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);color:var(--yellow);font-weight:600;font-family:var(--mono);font-size:12px}

.customer-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:6px}
.customer-tag{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:500;font-family:var(--mono)}

.wl-entry{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px}
.wl-name{font-weight:700;font-size:13px;color:#a855f7}
.wl-tag{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:500}
.wl-remove{padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:#ef4444;font-size:10px;cursor:pointer;font-weight:600;flex-shrink:0}
.wl-modal-entry{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#a855f708;border-radius:6px;margin-bottom:4px;border:1px solid #a855f712}
.wl-add-box{margin-top:8px;background:var(--bg);border-radius:8px;padding:10px;border:1px solid var(--border)}

.search-input{padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none;width:100%;max-width:360px;margin-bottom:12px}
.filter-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);font-size:10px;font-weight:600;background:var(--card);color:#666;cursor:pointer}
.filter-btn.active{border-color:#FFF20044;background:#FFF20010;color:var(--yellow)}

.price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.price-card{background:var(--bg);border-radius:8px;padding:12px;border:1px solid var(--border)}

.empty-state{text-align:center;padding:40px;color:var(--dim)}
.reset-btn{padding:8px 16px;border-radius:8px;border:1px solid #ef444433;background:#450a0a22;color:#ef4444;font-size:11px;font-weight:600;cursor:pointer;margin-top:20px}
.hidden{display:none!important}
td[draggable]{cursor:grab}
td[draggable]:active{cursor:grabbing}
td.dnd-over .slot-btn{outline:2px solid var(--yellow)!important;border-radius:5px}
@media(max-width:640px){.stats-inner{gap:10px}.header-inner{gap:8px}.tabs{flex-wrap:wrap}}
</style>
</head>

<div id="loginScreen" class="login-screen">

      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
      Kirjaudu @biitsi.fi -tilillä

    <div class="login-note">Vain @biitsi.fi -sähköpostiosoitteet</div>

<!-- APP (hidden until login) -->

// ╚══════════════════════════════════════════════════════════════╝
const ALLOWED_DOMAIN = "biitsi.fi";

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;

// ─── AUTH ───
function signIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ hd: ALLOWED_DOMAIN });
  auth.signInWithPopup(provider).then(result => {
    const email = result.user.email || "";
    if (!email.endsWith("@" + ALLOWED_DOMAIN)) {
      auth.signOut();
      showLoginError("Vain @biitsi.fi -sähköpostit sallittu.");
      return;
    }
  }).catch(err => {
    showLoginError("Kirjautuminen epäonnistui: " + err.message);
  });
}

function showLoginError(msg) {
  const el = document.getElementById("loginError");
  el.textContent = msg;
  el.style.display = "block";
}

auth.onAuthStateChanged(user => {
  if (user && user.email && user.email.endsWith("@" + ALLOWED_DOMAIN)) {
    currentUser = user;
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("appContainer").classList.remove("hidden");
    document.getElementById("userInfo").innerHTML = `
      ${user.photoURL ? `<img src="${user.photoURL}" alt="">` : ""}
      <span>${esc(user.displayName || user.email)}</span>
      <button onclick="auth.signOut()">Ulos</button>
    `;
    initApp();
  } else {
    currentUser = null;
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("appContainer").classList.add("hidden");
    if (user) auth.signOut(); // wrong domain
  }
});

// ─── STATE ───
let slots={};
let waitlist={};
let activeDay="Maanantai";
let activeView="grid";
let custSearch="",custFilter="all",wlSearch="";
let dbReady=false;
let _dndSrc=null;

function dndStart(e,loc,day,time,court){_dndSrc=`${loc}|${day}|${time}|${court}`;e.dataTransfer.effectAllowed='move';e.currentTarget.style.opacity='0.3'}
function dndEnd(e){e.currentTarget.style.opacity='';document.querySelectorAll('td.dnd-over').forEach(el=>el.classList.remove('dnd-over'))}
function dndOver(e){e.preventDefault();e.dataTransfer.dropEffect='move'}
function dndEnter(e){e.preventDefault();e.currentTarget.classList.add('dnd-over')}
function dndLeave(e){e.currentTarget.classList.remove('dnd-over')}
function dndDrop(e,loc,day,time,court){
  e.preventDefault();e.currentTarget.classList.remove('dnd-over');
  const dstKey=`${loc}|${day}|${time}|${court}`;
  if(!_dndSrc||_dndSrc===dstKey){_dndSrc=null;return}
  const src=slots[_dndSrc]?{...slots[_dndSrc]}:{status:'free',customer:'',notes:''};
  const dst=slots[dstKey]?{...slots[dstKey]}:{status:'free',customer:'',notes:''};
  if(src.status==='free'&&!src.customer&&!src.notes)delete slots[dstKey];else slots[dstKey]=src;
  if(dst.status==='free'&&!dst.customer&&!dst.notes)delete slots[_dndSrc];else slots[_dndSrc]=dst;
  _dndSrc=null;saveSlots();render()
}

function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function fmt(n){return n.toLocaleString("fi-FI")}
function getSlot(l,d,t,c){return slots[`${l}|${d}|${t}|${c}`]||{status:"free",customer:"",notes:""}}
function getWl(key){return waitlist[key]||[]}
function totalWl(){return Object.values(waitlist).reduce((s,l)=>s+l.length,0)}

// ─── MIGRAATIOT ───
// Lisää uusi migraatio tänne omalla id:llä. Jokainen ajetaan vain kerran.
const MIGRATIONS = {
  'v1_pending_kaikki': function() {
    // buildInit() asettaa jo pending — ei tarvitse tehdä mitään olemassa oleville
    return false;
  },
  'v2_perjantai_ei_myynta': function() {
    let changed = false;
    for(const loc of Object.keys(LOCS))for(const c of LOCS[loc])for(const t of TIMES){
      const k=`${loc}|Perjantai|${t}|${c}`;
      if(!slots[k]||slots[k].status==='free'){slots[k]={status:'notForSale',customer:'',notes:''};changed=true}
    }
    return changed;
  }
};

function runMigrations(applied) {
  let slotsChanged = false;
  const newlyApplied = {};
  for(const [id, fn] of Object.entries(MIGRATIONS)) {
    if(applied[id]) continue; // jo ajettu, ohita
    const changed = fn();
    if(changed) slotsChanged = true;
    newlyApplied[id] = true;
  }
  if(slotsChanged) db.ref("vakiovuorot/slots").set(slots);
  if(Object.keys(newlyApplied).length) db.ref("vakiovuorot/migrations").update(newlyApplied);
}

// ─── FIREBASE SYNC ───
function initApp(){
  // Lataa slots, aja migraatiot kerran, kuuntele muutoksia
  db.ref("vakiovuorot/slots").once("value", snap => {
    const val = snap.val();
    slots = val || buildInit();
    if(!val) db.ref("vakiovuorot/slots").set(slots);
    db.ref("vakiovuorot/migrations").once("value", mSnap => {
      runMigrations(mSnap.val() || {});
      dbReady = true;
      render();
      // Kuuntele reaaliaikaisesti migraatioiden jälkeen
      db.ref("vakiovuorot/slots").on("value", s => { slots = s.val() || {}; render(); });
    });
  });
  // Listen for waitlist
  db.ref("vakiovuorot/waitlist").on("value", snap => {
    waitlist = snap.val() || {};
    render();
  });
}

function saveSlots(){
  db.ref("vakiovuorot/slots").set(slots);
  flashSaved();
}
function saveWaitlist(){
  db.ref("vakiovuorot/waitlist").set(waitlist);
  flashSaved();
}
function flashSaved(){
  const b=document.getElementById("savedBadge");
  b.classList.add("show");
  setTimeout(()=>b.classList.remove("show"),1200);
}

// ─── ANALYTICS ───
const PRIME_TIMES=["16:30-18:00","18:00-19:30","19:30-21:00"];
function calcStats(){
  const st={total:0,booked:0,pending:0,notContinuing:0,notForSale:0,free:0,revM:0,revS:0,byLoc:{},byDay:{},prime:{total:0,booked:0,pending:0,notForSale:0}};
  for(const loc of Object.keys(LOCS))st.byLoc[loc]={total:0,booked:0,pending:0,free:0,notContinuing:0,notForSale:0,m:0,s:0,prime:{total:0,booked:0,pending:0,notForSale:0}};
  for(const day of DAYS)st.byDay[day]={total:0,booked:0,pending:0,free:0,notContinuing:0,notForSale:0,m:0,s:0};
  for(const loc of Object.keys(LOCS))for(const day of DAYS)for(const time of TIMES)for(const c of LOCS[loc]){
    const sl=getSlot(loc,day,time,c);st.total++;st[sl.status]++;
    st.byLoc[loc].total++;st.byLoc[loc][sl.status]++;st.byDay[day].total++;st.byDay[day][sl.status]++;
    if(PRIME_TIMES.includes(time)){st.prime.total++;st.byLoc[loc].prime.total++;if(sl.status==="notForSale"){st.prime.notForSale++;st.byLoc[loc].prime.notForSale++}else if(sl.status==="booked"){st.prime.booked++;st.byLoc[loc].prime.booked++}else if(sl.status==="pending"){st.prime.pending++;st.byLoc[loc].prime.pending++}}
    if(sl.status==="booked"||sl.status==="pending"){const p=PRICES[getPriceCat(day,time.split("-")[0])];if(p){st.revM+=p.monthly;st.revS+=p.season;st.byLoc[loc].m+=p.monthly;st.byLoc[loc].s+=p.season;st.byDay[day].m+=p.monthly;st.byDay[day].s+=p.season}}
  }
  return st;
}

// ─── RENDER ───
function render(){
  if(!dbReady)return;
  const st=calcStats();const sell=st.total-st.notForSale;const occ=sell>0?((st.booked+st.pending)/sell*100):0;
  const primeSell=st.prime.total-st.prime.notForSale,primeOcc=primeSell>0?((st.prime.booked+st.prime.pending)/primeSell*100):0,primeFree=primeSell-(st.prime.booked+st.prime.pending);
  document.getElementById("quickStats").innerHTML=`<span>Varausaste: <b style="color:var(--yellow)">${occ.toFixed(0)}%</b></span><span>Primetime: <b style="color:#f97316">${primeOcc.toFixed(0)}%</b></span><span>PT vapaa: <b style="color:#f97316">${primeFree}</b></span><span>Myyty: <b style="color:#22c55e">${st.booked}</b></span><span>Odottaa: <b style="color:#facc15">${st.pending}</b></span><span>Ei jatka: <b style="color:#ef4444">${st.notContinuing}</b></span><span>Vapaa: <b style="color:#3b82f6">${st.free}</b></span><span>Jonossa: <b style="color:#a855f7">${totalWl()}</b></span><span style="margin-left:auto"><b style="color:var(--yellow)">${fmt(st.revM)} €/kk</b></span>`;
  const twl=totalWl();document.getElementById("wlTab").textContent=`Jonolista${twl?` (${twl})`:""}`;
  ["grid","analytics","customers","waitlist"].forEach(v=>{document.getElementById("view"+v.charAt(0).toUpperCase()+v.slice(1)).classList.toggle("hidden",activeView!==v)});
  if(activeView==="grid")renderGrid(st);
  if(activeView==="analytics")renderAnalytics(st);
  if(activeView==="customers")renderCustomers();
  if(activeView==="waitlist")renderWaitlist();
}

      for(const c of courts){const sl=getSlot(loc,activeDay,time,c),cfg=ST[sl.status],key=`${loc}|${activeDay}|${time}|${c}`,wlc=getWl(key).length;

    h+=`</tbody></table></div>`}
  document.getElementById("viewGrid").innerHTML=h;

  // Waitlist
  h+=`<div style="border-top:1px solid var(--border);padding-top:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:12px;font-weight:700;color:#a855f7">📋 Jonolista</span>${wl.length?`<span style="font-size:9px;background:#a855f722;color:#a855f7;padding:1px 6px;border-radius:99px;font-weight:600">${wl.length}</span>`:""}</div>`;
  wl.forEach((e,i)=>{h+=`<div class="wl-modal-entry"><div><span style="font-weight:600;font-size:12px;color:#a855f7">${esc(e.name)}</span>${e.contact?`<span style="font-size:10px;color:#666;margin-left:8px">${esc(e.contact)}</span>`:""}${e.notes?`<span style="font-size:10px;color:var(--muted);margin-left:8px">– ${esc(e.notes)}</span>`:""}<span style="font-size:9px;color:var(--dim);margin-left:8px">${e.date}</span></div><button class="wl-remove" style="padding:2px 6px" onclick="removeWl('${key}',${i});openModal('${esc(loc)}','${day}','${time}',${court})">✕</button></div>`});
  h+=`<div class="wl-add-box"><label class="field-label" style="color:#a855f7">Lisää jonottaja</label><input class="field-input" id="wlName" placeholder="Nimi *" style="margin-bottom:6px;font-size:12px"><input class="field-input" id="wlContact" placeholder="Yhteystieto (puh/email)" style="margin-bottom:6px;font-size:12px"><input class="field-input" id="wlNotes" placeholder="Lisätiedot" style="margin-bottom:8px;font-size:12px"><button style="padding:7px 14px;border-radius:6px;border:none;font-size:11px;font-weight:700;background:#a855f7;color:#fff;cursor:pointer" onclick="addWl('${key}','${esc(loc)}','${day}','${time}',${court})">+ Lisää jonoon</button></div></div>`;
  document.getElementById("modalContent").innerHTML=h;document.getElementById("modalOverlay").classList.remove("hidden");
}
function modalSetStatus(st){window._modalStatus=st;for(const[k,v]of Object.entries(ST)){const b=document.getElementById("st-"+k);if(b){b.style.border=k===st?`2px solid ${v.color}`:`1px solid var(--border)`;b.style.background=k===st?v.bg:"var(--bg)"}}}
function saveModal(loc,day,time,court){const key=`${loc}|${day}|${time}|${court}`,cust=document.getElementById("mCust").value.trim(),notes=document.getElementById("mNotes").value.trim(),status=window._modalStatus;if(status==="free"&&!cust&&!notes)delete slots[key];else slots[key]={status,customer:cust,notes};saveSlots();closeModal();render()}
function closeModal(){document.getElementById("modalOverlay").classList.add("hidden")}
function addWl(key,loc,day,time,court){const name=document.getElementById("wlName").value.trim().toUpperCase();if(!name)return;const contact=document.getElementById("wlContact").value.trim(),notes=document.getElementById("wlNotes").value.trim();if(!waitlist[key])waitlist[key]=[];waitlist[key].push({name,contact,notes,date:new Date().toISOString().split("T")[0]});saveWaitlist();openModal(loc,day,time,court)}
function removeWl(key,idx){if(waitlist[key]){waitlist[key].splice(idx,1);if(!waitlist[key].length)delete waitlist[key];saveWaitlist();render()}}

// Tabs
document.getElementById("mainTabs").addEventListener("click",e=>{if(e.target.classList.contains("tab")){activeView=e.target.dataset.view;document.querySelectorAll("#mainTabs .tab").forEach(t=>t.classList.remove("active"));e.target.classList.add("active");render()}});
document.getElementById("modalOverlay").addEventListener("click",e=>{if(e.target===document.getElementById("modalOverlay"))closeModal()});
</script>
</body>
</html>
